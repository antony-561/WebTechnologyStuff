<html>
	<head>
		<title>Question 7</title>
		<link rel = "stylesheet" href = "style2.css">
		<script>
			function findDupes()
			{
				let str = document.getElementById("textIn").value;
				let arr = str.split(" ");
				let dup = false;
				let nodupe = [];
				let arrInd = 0;
				let resArr = [];
				for(let i = 0; i < arr.length; i++)
				{
					console.log(arr[i]);
					for(let j = i+1; j < arr.length; j++)
					{
						if(arr[i] == arr[j])
						{
							dup = true;
						}	
					}
					if(dup == false)
					{
						nodupe[arrInd] = arr[i]
						arrInd = arrInd+1;
					}
					console.log("After Check");
					for (let j = 0; j<nodupe.length; j++)
					{
						console.log(nodupe[j]);
					}
					dup = false;
					console.log("End Iteration");
				}
				let resStr = "Array without Duplicate elements is : ";
				for (let j = 0; j<nodupe.length; j++)
				{
					resStr = resStr + " " + nodupe[j];
				} 
				document.getElementById("resText").innerHTML = resStr;
			}
		</script>
	</head>
	<body>
		<div id = "mainDiv">
			<div id = "inputDiv">
			<p>Enter Array</p>
			<input id = "textIn" type = "text"><br><br>
			<button type = "button" onclick = "findDupes()">Find Duplicates</button>
			<p id = "resText"></p>
			<div>
		</div>
	</body>
</html>
